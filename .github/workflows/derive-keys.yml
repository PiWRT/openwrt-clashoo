name: Derive public keys (one-time)

on:
  workflow_dispatch:

jobs:
  derive:
    runs-on: ubuntu-latest
    steps:
      - name: Derive public keys
        env:
          KEY_BUILD: ${{ secrets.OPKG_KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$KEY_BUILD" > key-build
          printf '%s\n' "$PRIVATE_KEY" > private-key.pem

          # Extract OPKG public key from usign private key (embedded at bytes 32-63)
          python3 <<'PYEOF'
          import base64, hashlib, subprocess

          with open('key-build') as f:
              secret_raw = f.read().strip()
          # Handle both comment+key and bare key formats
          lines = secret_raw.splitlines()
          if len(lines) >= 2 and 'untrusted comment' in lines[0]:
              secret_b64 = lines[1].strip()
          else:
              secret_b64 = lines[0].strip()
          # Add padding if needed
          secret_b64 += '=' * (-len(secret_b64) % 4)
          secret = base64.b64decode(secret_b64)
          print(f"Secret decoded: {len(secret)} bytes")
          pubkey = secret[32:64]

          h = hashlib.sha512(pubkey).digest()
          fp = 0
          for b in h[:8]:
              fp = (fp << 8) | b

          comment = f"untrusted comment: public key {fp:016x}"
          pubkey_b64 = base64.b64encode(pubkey).decode()

          with open('/tmp/opkg-pub.key', 'w') as f:
              f.write(f"{comment}\n{pubkey_b64}\n")
          print("OPKG pubkey extracted successfully")
          PYEOF
          set -e

          echo "=== OPKG_PUB_KEY ==="
          cat /tmp/opkg-pub.key
          echo "=== END OPKG_PUB_KEY ==="

          echo "=== APK_PUB_KEY ==="
          openssl ec -pubout -in private-key.pem 2>/dev/null
          echo "=== END APK_PUB_KEY ==="
